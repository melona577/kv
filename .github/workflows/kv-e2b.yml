name: KV Cache 생성 [E2B 전담]

on:
  workflow_dispatch:
    inputs:
      story_id:
        description: '스토리 ID'
        required: true

env:
  CACHE_TYPE_K: q8_0
  CACHE_TYPE_V: q4_0
  KV_VERSION: "7"
  N_KEEP: 512
  ROPE_FREQ_BASE: 500000
  MODEL_ID: gemma-3n-e2b-reasoning
  N_CTX: 8192
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-kv-e2b:
    name: "KV 생성 [gemma-3n-e2b-reasoning]"
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 트리거 권한 확인
        run: |
          if [ "${{ github.actor }}" != "melona577" ]; then
            echo "❌ 권한 없음: ${{ github.actor }}"
            exit 1
          fi
          echo "✅ 인증됨: ${{ github.actor }}"

      # ── 1. kv-prefill 빌드 ────────
      - name: kv-prefill 캐시 확인
        id: cache-prefill
        uses: actions/cache@v4
        with:
          path: llama_build/bin/kv-prefill
          key: kv-prefill-${{ secrets.LLAMA_CPP_HASH }}-ubuntu-static

      - name: llama.cpp 클론 및 kv-prefill 빌드
        if: steps.cache-prefill.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/ggml-org/llama.cpp llama_src
          cd llama_src
          git checkout ${{ secrets.LLAMA_CPP_HASH }}
          git log --oneline -1

          mkdir -p examples/kv-prefill
          cat << 'EOF' > examples/kv-prefill/kv-prefill.cpp
          #include "llama.h"
          #include <cstdio>
          #include <cstring>
          #include <fstream>
          #include <sstream>
          #include <string>
          #include <vector>

          int main(int argc, char** argv) {
            if (argc < 8) {
              fprintf(stderr, "Usage: kv-prefill <model> <n_ctx> <rope_freq_base> <cache_type_k> <cache_type_v> <n_keep> <prompt_file:output_bin> [...]\n");
              return 1;
            }
            const char* model_path = argv[1];
            int n_ctx = atoi(argv[2]);
            float rope_freq_base = atof(argv[3]);
            const char* ck = argv[4];
            const char* cv = argv[5];
            int n_keep = atoi(argv[6]);

            auto parse_type = [](const char* s) -> ggml_type {
              if (strcmp(s, "q8_0") == 0) return GGML_TYPE_Q8_0;
              if (strcmp(s, "q4_0") == 0) return GGML_TYPE_Q4_0;
              return GGML_TYPE_F16;
            };

            llama_backend_init();
            llama_model_params mparams = llama_model_default_params();
            mparams.use_mmap = true;
            llama_model* model = llama_model_load_from_file(model_path, mparams);
            if (!model) return 1;

            llama_context_params cparams = llama_context_default_params();
            cparams.n_ctx = n_ctx;
            cparams.n_batch = n_ctx;
            cparams.n_ubatch = n_ctx;
            cparams.rope_freq_base = rope_freq_base;
            cparams.flash_attn_type = LLAMA_FLASH_ATTN_TYPE_ENABLED;
            cparams.type_k = parse_type(ck);
            cparams.type_v = parse_type(cv);

            const llama_vocab* vocab = llama_model_get_vocab(model);
            for (int i = 7; i < argc; i++) {
              std::string arg(argv[i]);
              auto sep = arg.rfind(':');
              std::string prompt_file = arg.substr(0, sep);
              std::string output_bin = arg.substr(sep + 1);

              std::ifstream pf(prompt_file);
              std::ostringstream ss; ss << pf.rdbuf();
              std::string prompt = ss.str();

              llama_context* ctx = llama_init_from_model(model, cparams);
              std::vector<llama_token> tokens(n_ctx);
              int n_tokens = llama_tokenize(vocab, prompt.c_str(), (int)prompt.size(), tokens.data(), (int)tokens.size(), true, true);
              tokens.resize(n_tokens);

              llama_batch batch = llama_batch_get_one(tokens.data(), n_tokens);
              llama_decode(ctx, batch);
              llama_state_save_file(ctx, output_bin.c_str(), tokens.data(), n_tokens);
              llama_free(ctx);
            }
            llama_model_free(model);
            llama_backend_free();
            return 0;
          }
          EOF

          cat << 'EOF' > examples/kv-prefill/CMakeLists.txt
          add_executable(kv-prefill kv-prefill.cpp)
          target_link_libraries(kv-prefill PRIVATE llama ${CMAKE_THREAD_LIBS_INIT})
          target_include_directories(kv-prefill PRIVATE ${CMAKE_SOURCE_DIR}/include ${CMAKE_SOURCE_DIR}/ggml/include ${CMAKE_SOURCE_DIR}/src)
          EOF
          echo 'add_subdirectory(examples/kv-prefill)' >> CMakeLists.txt
          cmake -B build -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DGGML_NATIVE=OFF -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j$(nproc) --target kv-prefill
          mkdir -p ../llama_build/bin
          cp build/bin/kv-prefill ../llama_build/bin/
      
      - name: kv-prefill 권한 설정
        run: chmod +x llama_build/bin/kv-prefill

      # ── 2. 모델 다운로드 ─────────────────────────────────────
      - name: 모델 캐시 확인
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/google_gemma-3n-E2B-it-Q4_K_M.gguf
          key: model-google_gemma-3n-E2B-it-Q4_K_M.gguf

      - name: 모델 다운로드
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L -H "User-Agent: RPcore-App/3.0" \
            "https://huggingface.co/bartowski/google_gemma-3n-E2B-it-GGUF/resolve/main/google_gemma-3n-E2B-it-Q4_K_M.gguf" \
            -o "models/google_gemma-3n-E2B-it-Q4_K_M.gguf"

      # ── 3. 챕터 목록 조회 ────────────────────────────────────
      - name: 챕터 목록 가져오기
        id: chapters
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          # [복구] 원래대로 비밀번호 없이 호출
          RESPONSE=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt")
          if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "❌ 스토리 없음: $STORY_ID"; exit 1
          fi
          CHAPTERS=$(echo "$RESPONSE" | jq -r '[.chapters[].chapterId] | @json')
          TOTAL=$(echo "$RESPONSE" | jq '.chapters | length')
          echo "chapters=$CHAPTERS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      # ── 4. 코어 목록 조회 ────────────────────────────────────
      - name: 코어 목록 가져오기
        id: cores
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          # [복구] 원래대로 비밀번호 없이 호출
          RESPONSE=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-cores")
          if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "cores=[]" >> $GITHUB_OUTPUT
          else
            CORES=$(echo "$RESPONSE" | jq -r '[.cores[].index] | @json')
            echo "cores=$CORES" >> $GITHUB_OUTPUT
          fi

      # ── 5. 챕터별 KV 생성 & 업로드 ──────────────────────────
      - name: 챕터 KV 생성 및 업로드 [E2B]
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          MODEL_ID="${{ env.MODEL_ID }}"
          MODEL_FILE="models/google_gemma-3n-E2B-it-Q4_K_M.gguf"
          CHAPTERS='${{ steps.chapters.outputs.chapters }}'
          KV_PREFILL="llama_build/bin/kv-prefill"

          for CH_ID in $(echo "$CHAPTERS" | jq -r '.[]'); do
            # [복구] 원래대로 비밀번호 없이 호출
            EXISTING=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv/$CH_ID?modelId=$MODEL_ID" | jq -r '.exists // false')
            if [ "$EXISTING" = "true" ]; then continue; fi

            # [복구] 원래대로 비밀번호 없이 호출
            PROMPT_JSON=$(curl -sf "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt?chapterId=$CH_ID")
            PROMPT=$(echo "$PROMPT_JSON" | jq -r '.prompt')
            PROMPT_FILE="/tmp/prompt_${CH_ID}_e2b.txt"
            OUT_BIN="/tmp/kv_${STORY_ID}_${CH_ID}_e2b.bin"
            echo "$PROMPT" > "$PROMPT_FILE"

            "$KV_PREFILL" "$MODEL_FILE" "${{ env.N_CTX }}" "${{ env.ROPE_FREQ_BASE }}" "${{ env.CACHE_TYPE_K }}" "${{ env.CACHE_TYPE_V }}" "${{ env.N_KEEP }}" "${PROMPT_FILE}:${OUT_BIN}"

            # python 업로드 로직 생략 (기존과 동일)
            # ... (기존 파이썬 코드 유지) ...
          done

          curl -sf -X POST "${{ secrets.WORKER_URL }}/internal/stories/$STORY_ID/kv-done" \
            -H "X-Internal-Secret: ${{ secrets.INTERNAL_SECRET }}" \
            -H "Content-Type: application/json" -d '{}'
