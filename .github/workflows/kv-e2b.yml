      - name: 챕터 KV 생성 및 업로드 [E2B]
        run: |
          STORY_ID="${{ github.event.inputs.story_id }}"
          MODEL_ID="${{ env.MODEL_ID }}"
          MODEL_FILE="models/google_gemma-3n-E2B-it-Q4_K_M.gguf"
          CHAPTERS='${{ steps.chapters.outputs.chapters }}'
          KV_PREFILL="llama_build/bin/kv-prefill"

          echo "════════════════════════════════════"
          echo "스토리: $STORY_ID | 모델: $MODEL_ID"
          echo "════════════════════════════════════"

          PREFILL_ARGS=""
          PENDING_CHAPTERS=""

          for CH_ID in $(echo "$CHAPTERS" | jq -r '.[]'); do
            EXISTING=$(curl -sf \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv/$CH_ID?modelId=$MODEL_ID&secret=${{ secrets.ADMIN_KV_SECRET }}" \
              | jq -r '.exists // false')
            if [ "$EXISTING" = "true" ]; then
              echo "⏭ $CH_ID - 이미 존재, 스킵"
              continue
            fi

            PROMPT_JSON=$(curl -sf \
              "${{ secrets.WORKER_URL }}/api/stories/$STORY_ID/kv-prompt?chapterId=$CH_ID&secret=${{ secrets.ADMIN_KV_SECRET }}")
            PROMPT=$(echo "$PROMPT_JSON" | jq -r '.prompt')
            TOKEN_EST=$(echo "$PROMPT_JSON" | jq -r '.tokenEstimate // 0')
            PROMPT_FILE="/tmp/prompt_${CH_ID}_${MODEL_ID}.txt"
            OUT_BIN="/tmp/kv_${STORY_ID}_${CH_ID}_${MODEL_ID}.bin"

            echo "$PROMPT" > "$PROMPT_FILE"
            echo "  📥 $CH_ID (~${TOKEN_EST} 토큰)"
            PREFILL_ARGS="$PREFILL_ARGS ${PROMPT_FILE}:${OUT_BIN}"
            PENDING_CHAPTERS="$PENDING_CHAPTERS $CH_ID"
          done

          SUCCESS=0
          FAIL=0

          if [ -n "$PENDING_CHAPTERS" ]; then
            echo ""
            echo "🚀 kv-prefill 실행 (모델 1회 로드, 챕터 일괄 처리)..."
            "$KV_PREFILL" \
              "$MODEL_FILE" \
              "${{ env.N_CTX }}" \
              "${{ env.ROPE_FREQ_BASE }}" \
              "${{ env.CACHE_TYPE_K }}" \
              "${{ env.CACHE_TYPE_V }}" \
              "${{ env.N_KEEP }}" \
              $PREFILL_ARGS

            for CH_ID in $PENDING_CHAPTERS; do
              OUT_BIN="/tmp/kv_${STORY_ID}_${CH_ID}_${MODEL_ID}.bin"
              PROMPT_FILE="/tmp/prompt_${CH_ID}_${MODEL_ID}.txt"
              if [ ! -f "$OUT_BIN" ] || [ ! -s "$OUT_BIN" ]; then
                echo "❌ $CH_ID - KV bin 없음 (prefill 실패)"
                FAIL=$((FAIL + 1))
                continue
              fi

              BIN_KB=$(( $(wc -c < "$OUT_BIN") / 1024 ))
              echo "📤 $CH_ID - ${BIN_KB} KB 업로드 중..."
              python3 << PYEOF
          import sys, json, hashlib, hmac, datetime
          import urllib.request, urllib.error
          from urllib.parse import urlencode

          story_id      = "${STORY_ID}"
          ch_id         = "${CH_ID}"
          model_id      = "${MODEL_ID}"
          out_bin       = "${OUT_BIN}"
          account_id    = "${{ vars.CF_ACCOUNT_ID }}"
          d1_db_id      = "${{ vars.CF_D1_DB_ID }}"
          api_token     = "${{ secrets.CF_API_TOKEN }}"
          r2_access_key = "${{ secrets.R2_ACCESS_KEY_ID }}"
          r2_secret_key = "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          r2_bucket     = "${{ secrets.R2_BUCKET_NAME }}"
          kv_version    = "${{ env.KV_VERSION }}"

          with open(out_bin, "rb") as f:
              raw = f.read()

          r2_key = f"kv_cache/{story_id}/{ch_id}_{model_id}.bin"

          def sha256hex(data):
              if isinstance(data, str):
                  data = data.encode()
              return hashlib.sha256(data).hexdigest()

          def hmac_sha256(key, msg):
              if isinstance(msg, str):
                  msg = msg.encode()
              if not isinstance(key, bytes):
                  key = key.encode()
              return hmac.new(key, msg, hashlib.sha256).digest()

          def get_signing_key(secret, datestamp, region, service):
              k = hmac_sha256(f"AWS4{secret}", datestamp)
              k = hmac_sha256(k, region)
              k = hmac_sha256(k, service)
              return hmac_sha256(k, "aws4_request")

          now = datetime.datetime.now(datetime.timezone.utc)
          datestamp = now.strftime("%Y%m%d")
          timestamp = now.strftime("%Y%m%dT%H%M%SZ")
          region, service = "auto", "s3"
          host = f"{r2_bucket}.{account_id}.r2.cloudflarestorage.com"
          credential_scope = f"{datestamp}/{region}/{service}/aws4_request"
          params = sorted([
              ("X-Amz-Algorithm", "AWS4-HMAC-SHA256"),
              ("X-Amz-Credential", f"{r2_access_key}/{credential_scope}"),
              ("X-Amz-Date", timestamp),
              ("X-Amz-Expires", "3600"),
              ("X-Amz-SignedHeaders", "host"),
          ])
          qs = urlencode(params)
          canonical = "\n".join(["PUT", f"/{r2_key}", qs, f"host:{host}\n", "host", "UNSIGNED-PAYLOAD"])
          string_to_sign = "\n".join(["AWS4-HMAC-SHA256", timestamp, credential_scope, sha256hex(canonical)])
          signing_key = get_signing_key(r2_secret_key, datestamp, region, service)
          signature = hmac.new(signing_key, string_to_sign.encode(), hashlib.sha256).hexdigest()
          presigned_url = f"https://{host}/{r2_key}?{qs}&X-Amz-Signature={signature}"

          req = urllib.request.Request(
              presigned_url,
              data=raw,
              headers={"Content-Type": "application/octet-stream"},
              method="PUT",
          )
          try:
              with urllib.request.urlopen(req) as res:
                  if res.status not in (200, 204):
                      print(f"❌ R2 실패: {res.status}", file=sys.stderr)
                      sys.exit(1)
          except urllib.error.HTTPError as e:
              print(f"❌ R2 실패: HTTP {e.code} | {e.read().decode()[:200]}", file=sys.stderr)
              sys.exit(1)

          def d1_query(sql, params):
              payload = json.dumps({"sql": sql, "params": params}).encode()
              req = urllib.request.Request(
                  f"https://api.cloudflare.com/client/v4/accounts/{account_id}/d1/database/{d1_db_id}/query",
                  data=payload,
                  headers={"Authorization": f"Bearer {api_token}", "Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req) as res:
                  return json.loads(res.read())

          try:
              d1_query(
                  "DELETE FROM story_kv_cache WHERE story_id=? AND chapter_id=? AND model_id=?",
                  [story_id, ch_id, model_id],
              )
              body = d1_query(
                  "INSERT INTO story_kv_cache (story_id, chapter_id, model_id, llama_rn_version, r2_key) VALUES (?, ?, ?, ?, ?)",
                  [story_id, ch_id, model_id, kv_version, r2_key],
              )
              if body.get("success"):
                  print(f"✅ {r2_key}")
              else:
                  print(f"❌ D1 실패: {body}", file=sys.stderr)
                  sys.exit(1)
          except urllib.error.HTTPError as e:
              print(f"❌ D1 실패: HTTP {e.code} | {e.read().decode()[:200]}", file=sys.stderr)
              sys.exit(1)
          PYEOF
              if [ $? -ne 0 ]; then
                FAIL=$((FAIL + 1))
              else
                SUCCESS=$((SUCCESS + 1))
              fi

              rm -f "$OUT_BIN" "$PROMPT_FILE"
            done
          else
            echo "✅ 모든 챕터 이미 존재 - kv-done만 재신고합니다"
          fi

          echo ""
          echo "════════════════════════════════════"
          echo "[$MODEL_ID] 완료: 성공 ${SUCCESS}개 / 실패 ${FAIL}개"
          echo "════════════════════════════════════"

          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi

          curl -sf -X POST \
            "${{ secrets.WORKER_URL }}/internal/stories/$STORY_ID/kv-done" \
            -H "X-Internal-Secret: ${{ secrets.INTERNAL_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' || echo "⚠️ kv-done 신고 실패 (무시)"
